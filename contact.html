 .fish {
  position: absolute;

  top: 100px;

  position: absolute;

}

.fish3 {
  position: absolute;
  width: 65px;
  bottom: 40px;
 

  animation: swimRight 14s linear infinite;
}

/* Right → Left */
@keyframes swimLeft {
  0% {
    left: 100%;
    transform: translateY(0);
  }

  25% {
    transform: translateY(-20px);
  }

  50% {
    transform: translateY(10px);
  }

  75% {
    transform: translateY(-15px);
  }

  100% {
    left: -50px; /* moves fully off-screen */
    transform: translateY(0);
  }
}

/* Left → Right */
@keyframes swimRight {
  0% {
    left: -50px;
    transform: translateY(0);
  }

  25% {
    transform: translateY(-20px);
  }

  50% {
    transform: translateY(10px);
  }

  75% {
    transform: translateY(-15px);
  }

  100% {
    left: 100%;
    transform: translateY(0);
  }
}
