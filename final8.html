<button onclick="openImage()">Open Picture</button>

<!-- Modal -->
<div id="imageModal" class="modal">
  <span class="close" onclick="closeImage()">&times;</span>
  <img class="modal-content" src="picture.png">
</div>

<style>
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.8);
}

.modal-content {
  display: block;
  margin: 5% auto;
  max-width: 80%;
  max-height: 80%;
}

.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}
</style>

<script>
function openImage() {
  document.getElementById("imageModal").style.display = "block";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}
</script>
